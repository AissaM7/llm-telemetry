# ═══════════════════════════════════════════════════════════════════
# @llm-telemetry/react-native — Grafana Observability Stack
# ═══════════════════════════════════════════════════════════════════
# Complete local stack: Grafana + Tempo + Loki
# Usage: docker-compose -f docker-compose.grafana.yml up -d

version: '3.8'

services:
  # ─── Grafana Tempo (Trace Backend) ──────────────────────────────
  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - tempo-data:/var/tempo
    configs:
      - source: tempo-config
        target: /etc/tempo.yaml
    ports:
      - "4317:4317"   # gRPC OTLP
      - "4318:4318"   # HTTP OTLP
      - "3200:3200"   # Tempo query API

  # ─── Grafana Loki (Log Backend) ─────────────────────────────────
  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki

  # ─── Grafana (Visualization) ────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - grafana-data:/var/lib/grafana
    configs:
      - source: grafana-datasources
        target: /etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - tempo
      - loki

configs:
  # ─── Tempo Configuration ─────────────────────────────────────
  tempo-config:
    content: |
      # Tempo configuration
      server:
        http_listen_port: 3200

      distributor:
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: "0.0.0.0:4317"
              http:
                endpoint: "0.0.0.0:4318"

      ingester:
        trace_idle_period: 10s
        max_block_bytes: 1048576
        max_block_duration: 5m

      compactor:
        compaction:
          block_retention: 48h

      storage:
        trace:
          backend: local
          local:
            path: /var/tempo/traces
          wal:
            path: /var/tempo/wal

      metrics_generator:
        registry:
          external_labels:
            source: tempo
        storage:
          path: /var/tempo/generator/wal

  # ─── Grafana Datasource Provisioning ─────────────────────────
  grafana-datasources:
    content: |
      apiVersion: 1
      datasources:
        - name: Tempo
          type: tempo
          access: proxy
          url: http://tempo:3200
          isDefault: true
          jsonData:
            httpMethod: GET
            tracesToLogs:
              datasourceUid: loki
              tags: ['service.name']
              mappedTags: [{ key: 'service.name', value: 'app' }]
              mapTagNamesEnabled: true
              filterByTraceID: true
              filterBySpanID: true
            nodeGraph:
              enabled: true
            search:
              hide: false

        - name: Loki
          type: loki
          uid: loki
          access: proxy
          url: http://loki:3100
          jsonData:
            derivedFields:
              - datasourceUid: tempo
                matcherRegex: '"trace_id":"(\w+)"'
                name: TraceID
                url: '$${__value.raw}'

volumes:
  tempo-data:
  loki-data:
  grafana-data:
